<!DOCTYPE html>
<html lang="ru">
<head>
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <meta charset="UTF-8">
  <title>Настройки</title>
  <link rel="stylesheet" href="newdn.css">
  <link rel="icon" type="image/png" href="img/favicon.png" />
</head>
<body>
  <div class="container">
    
    <header class="header">
      <div class="logo">
        <img src="img/settings.svg" alt="настройки">
        <div class="title">НАСТРОЙКИ</div>
      </div>
    </header>

    <main class="main">
      <div class="settings-container">
        <div class="settings-fields">
          <div class="settings-field">
            <div class="settings-field-label">Уведомления</div>
            <button type="button" class="settings-toggle-btn" id="notifBtn" onclick="toggleNotifications()">
              <img src="img/bell_on.svg" alt="уведомления включены" id="notifIcon">
            </button>
          </div>

          <div class="settings-field">
            <div class="settings-field-label">Код семьи</div>
            <div id="invite-code" class="settings-field-value">Загрузка...</div>
          </div>

          <div class="settings-field">
            <div class="settings-field-label">Роль в семье</div>
            <div class="settings-field-value">Ребёнок</div>
          </div>
        </div>

        <button class="logout-btn">Выйти из аккаунта</button>
      </div>
    </main>

    <footer class="footer">
      <a href="tasks.html" class="nav-icon"><img src="img/home.svg" alt="домой"></a>
      <a href="profile.html" class="nav-icon"><img src="img/profile.svg" alt="профиль"></a>
      <a href="settings.html" class="nav-icon"><img src="img/settings.svg" alt="настройки"></a>
    </footer>

  </div>

<script>
    const API_URL = 'https://todo-stasnau.amvera.io';
    let notificationsEnabled = true;

    // Переключение иконки уведомлений
    function toggleNotifications() {
      notificationsEnabled = !notificationsEnabled;
      const icon = document.getElementById('notifIcon');
      if (notificationsEnabled) {
        icon.src = 'img/bell_on.svg';
        icon.alt = 'уведомления включены';
      } else {
        icon.src = 'img/bell_off.svg';
        icon.alt = 'уведомления выключены';
      }
    }

    // Бронебойная загрузка кода семьи
    document.addEventListener('DOMContentLoaded', async () => {
      const codeField = document.getElementById('invite-code');
      if (!codeField) return;

      // Вспомогательная функция для защиты от строк "undefined" или "null"
      const isValid = (val) => val && val !== 'undefined' && val !== 'null' && String(val).trim() !== '';

      // 1. Проверяем кэш браузера
      let cachedCode = localStorage.getItem('invite_code');
      if (isValid(cachedCode)) {
        codeField.textContent = cachedCode;
        return;
      }

      // 2. Если кода в кэше нет, берем ID семьи (он 100% есть, раз работают задачи)
      const familyId = localStorage.getItem('family_id');
      const vkId = localStorage.getItem('vk_id');

      try {
        let finalCode = null;

        // ПЛАН А: Запрос параметров семьи по ее ID (самый надежный)
        if (isValid(familyId)) {
          const res = await fetch(`${API_URL}/family/get?family_id=${familyId}`);
          let data = await res.json();
          
          // Если бэк отдает массив (как у тебя было в display.js)
          if (Array.isArray(data)) data = data[0]; 
          
          finalCode = data?.invite_code || data?.code;
        }

        // ПЛАН Б: Резервный запрос через профиль пользователя (если План А не сработал)
        if (!isValid(finalCode) && isValid(vkId)) {
          const res = await fetch(`${API_URL}/user/load_user_family?vk_id=${vkId}`);
          const data = await res.json();
          if (data?.status === 'family_found') {
            finalCode = data.invite_code || data.code;
          }
        }

        // 3. Если удалось достать код — выводим и кэшируем навсегда
        if (isValid(finalCode)) {
          const cleanCode = String(finalCode).trim();
          codeField.textContent = cleanCode;
          codeField.style.color = 'white'; // Возвращаем белый цвет тексту
          localStorage.setItem('invite_code', cleanCode);
          return;
        }

      } catch (e) {
        console.error('Ошибка при запросе кода с бэкенда:', e);
      }

      // 4. Если бэкенд так и не отдал код
      codeField.textContent = 'Код не найден на сервере';
      codeField.style.color = '#ff6b6b';
    });

    // Очистка сессии при выходе из аккаунта
    document.addEventListener('DOMContentLoaded', () => {
      const logoutBtn = document.querySelector('.logout-btn');
      if (logoutBtn) {
        logoutBtn.removeAttribute('onclick'); // Убираем старый атрибут, если он есть
        logoutBtn.addEventListener('click', (e) => {
          e.preventDefault();
          localStorage.clear(); // Полностью сбрасываем кэш, чтобы не путать ID
          window.location.href = 'index.html';
        });
      }
    });
  </script>
</body>
</html>
