<!DOCTYPE html>
<html lang="ru">
<head>
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <meta charset="UTF-8">
  <title>Присоединение</title>
  <link rel="stylesheet" href="newdn.css">
  <link rel="icon" type="image/png" href="img/favicon.png" />
</head>
<body>
  <div class="container">
    
    <header class="header">
      <div class="logo">
        <img src="img/vk_circled.svg" alt="вк">
        <div class="title">СЕМЕЙНЫЙ МЕНЕДЖЕР</div>
      </div>
    </header>

    <main class="main">
      <div class="card">
        <p class="card-title">Введите код приглашения:</p>

        <input type="text" id="invite-code-input" class="input" placeholder="Введите код приглашения">

        <p id="join-error" style="color: #ff6b6b; margin-top: 10px; font-size: 14px; min-height: 20px;"></p>

        <button id="join-btn" class="action-btn next-btn">
          <span class="chs-btn">Далее</span>
          <img src="img/next_page.svg" alt="далее">
        </button>
      </div>
    </main>

  </div>
  <script src="script/join.js"></script>
</body>
</html>
