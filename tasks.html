<!DOCTYPE html>
<html lang="ru">
<head>
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <meta charset="UTF-8">
  <title>Задачи</title>
  <link rel="stylesheet" href="newdn.css">
  <link rel="icon" type="image/png" href="img/favicon.png" />
</head>
<body>
  <div class="container">
    
    <header class="header">
      <div class="logo">
        <img src="img/usr_groups.svg" alt="вк">
        <div id="family-title" class="title">СЕМЬЯ ...</div>
      </div>
    </header>

    <main class="main">
      <div class="task-list">
        <div class="tabs">
          <button id="tab-my" class="tab-btn active" onclick="switchTab('my')">Мои задачи</button>
          <button id="tab-all" class="tab-btn" onclick="switchTab('all')">Все задачи</button>
        </div>

        <div id="tasks-container" class="task-list">
          <!-- Сюда JS будет вставлять задачи -->
        </div>

        <button class="add-task-btn" onclick="location.href='new_tasks.html'">
          <img src="img/sum.svg" alt="добавить">
          <span>Добавить задачу</span>
        </button>
      </div>
    </main>

    <footer class="footer">
      <a href="tasks.html" class="nav-icon"><img src="img/home.svg" alt="домой"></a>
      <a href="profile.html" class="nav-icon"><img src="img/profile.svg" alt="профиль"></a>
      <a href="settings.html" class="nav-icon"><img src="img/settings.svg" alt="настройки"></a>
    </footer>

  </div>

    <script src="script/tasks.js"></script>
    <script src="script/display.js"></script>
</body>
</html>
